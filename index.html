<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17211d">
  <meta name="description" content="Recipes, exact pairing profiles, Italian food culture and culinary science.">
  <link rel="manifest" href="manifest-r2.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles-r2.css?v=2">
  <title>Daily Culinary — Italian Library</title>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">DAILY CULINARY</p>
        <h1>Italian food, properly sourced.</h1>
        <p id="libraryCount" class="library-count"></p>
      </div>
    </header>

    <section class="controls">
      <div id="filters" class="filters" aria-label="Card type">
        <button class="active" data-type="All">All</button>
        <button data-type="Recipe">Sicilian recipes</button>
        <button data-type="Classic Recipe">Italian classics</button>
        <button data-type="Pairing Profile">Exact pairings</button>
        <button data-type="Food Culture">Culture</button>
        <button data-type="Food Science">Science</button>
      </div>
      <label class="search-wrap">
        <span>Search</span>
        <input id="search" type="search" placeholder="tomato, pasta, anchovy, Sicily…">
      </label>
    </section>

    <main>
      <article id="card" class="card">
        <figure id="imageWrap" class="image-wrap" hidden>
          <img id="image" alt="">
          <figcaption id="imageCaption"></figcaption>
        </figure>

        <div class="content">
          <div class="meta-row">
            <span id="typeBadge" class="badge"></span>
            <span id="progressLabel"></span>
          </div>
          <p id="source" class="source"></p>
          <h2 id="title"></h2>
          <p id="subtitle" class="subtitle"></p>
          <div id="body"><div class="loading-state">Loading the culinary library…</div></div>

          <div class="actions">
            <button id="next" class="primary">Next unseen</button>
            <button id="save" class="secondary">Save</button>
            <button id="learn" class="secondary">Mark learned</button>
          </div>
        </div>
      </article>

      <section class="stats">
        <div><strong id="viewedCount">0</strong><span>Discovered</span></div>
        <div><strong id="savedCount">0</strong><span>Saved</span></div>
        <div><strong id="learnedCount">0</strong><span>Learned</span></div>
      </section>

      <section class="saved-section">
        <div class="section-title">
          <div>
            <p class="eyebrow">YOUR LIBRARY</p>
            <h2>Saved cards</h2>
          </div>
          <button id="clearSaved" class="text-button">Clear</button>
        </div>
        <div id="savedList" class="saved-list"></div>
      </section>
    </main>
  </div>


  <script>
    window.CULINARY_BUILD = "italian-library-r2";
    window.addEventListener("error", function (event) {
      const body = document.getElementById("body");
      if (body && !window.CULINARY_APP_STARTED) {
        body.innerHTML =
          '<div class="load-error"><strong>The content files did not load.</strong>' +
          '<p>Check that <code>cards-r2.js</code> and <code>app-r2.js</code> are in the repository root, then refresh.</p></div>';
      }
    });
    window.addEventListener("load", function () {
      setTimeout(function () {
        if (!window.CULINARY_APP_STARTED) {
          const body = document.getElementById("body");
          if (body) {
            body.innerHTML =
              '<div class="load-error"><strong>The app is still using mismatched cached files.</strong>' +
              '<p>Refresh once more. This version uses new filenames so the old cache cannot be reused.</p></div>';
          }
        }
      }, 2500);
    });
  </script>
  <script src="cards-r2.js?v=2"></script>
  <script src="app-r2.js?v=2"></script>
</body>
</html>
