<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#17211d" />
  <meta name="description" content="A daily culinary learning app for recipes, techniques and food science." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>Daily Culinary</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">DAILY CULINARY</p>
        <h1>One useful idea, every day.</h1>
      </div>
      <button id="installBtn" class="ghost-button" hidden>Install</button>
    </header>

    <main>
      <section class="hero-card" aria-labelledby="todayTitle">
        <div class="hero-meta">
          <span id="dayLabel"></span>
          <span id="categoryBadge" class="badge"></span>
        </div>

        <p id="sourceLabel" class="source"></p>
        <h2 id="todayTitle"></h2>
        <p id="summary" class="summary"></p>

        <div class="section-block">
          <h3>The idea</h3>
          <p id="idea"></p>
        </div>

        <div class="section-block">
          <h3>How to apply it</h3>
          <ul id="steps"></ul>
        </div>

        <div class="section-block chef-note">
          <h3>Chef-level detail</h3>
          <p id="detail"></p>
        </div>

        <div class="section-block challenge">
          <h3>Try this today</h3>
          <p id="challenge"></p>
        </div>

        <div class="actions">
          <button id="saveBtn" class="primary-button">Save lesson</button>
          <button id="completeBtn" class="secondary-button">Mark as learned</button>
        </div>
      </section>

      <section class="stats-grid" aria-label="Learning statistics">
        <article>
          <span id="streakCount">0</span>
          <p>Day streak</p>
        </article>
        <article>
          <span id="savedCount">0</span>
          <p>Saved</p>
        </article>
        <article>
          <span id="learnedCount">0</span>
          <p>Learned</p>
        </article>
      </section>

      <section class="library">
        <div class="section-heading">
          <div>
            <p class="eyebrow">YOUR LIBRARY</p>
            <h2>Saved lessons</h2>
          </div>
          <button id="clearSavedBtn" class="text-button">Clear</button>
        </div>
        <div id="savedList" class="saved-list"></div>
      </section>
    </main>

    <footer>
      <p>Built for deliberate culinary practice.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
