<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#17211d" />
  <meta name="description" content="Two thousand Italian food discoveries." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>Daily Culinary — Italian Food 2000</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">DAILY CULINARY</p>
        <h1>Two thousand Italian food discoveries.</h1>
      </div>
    </header>

    <nav id="filters" class="filters" aria-label="Discovery filters">
      <button class="active" data-f="All">All</button>
      <button data-f="Recipe">Recipes</button>
      <button data-f="Technique">Skills</button>
      <button data-f="Ingredient">Ingredients</button>
      <button data-f="Pairing">Pairings</button>
      <button data-f="Food Science">Science</button>
      <button data-f="Culture">Culture</button>
      <button data-f="Vocabulary">Italian words</button>
    </nav>

    <main>
      <section class="hero-card">
        <figure class="photo-wrap">
          <img id="photo" class="photo" alt="" />
          <figcaption id="credit"></figcaption>
        </figure>

        <div class="card-content">
          <div class="hero-meta">
            <span id="date"></span>
            <span id="cat" class="badge"></span>
          </div>

          <p id="source" class="source"></p>
          <h2 id="title"></h2>
          <p id="summary" class="summary"></p>

          <div class="section-block">
            <h3>The idea</h3>
            <p id="idea"></p>
          </div>

          <div class="section-block">
            <h3>How to apply it</h3>
            <ul id="steps"></ul>
          </div>

          <div class="section-block chef-note">
            <h3>Chef-level detail</h3>
            <p id="detail"></p>
          </div>

          <div class="section-block challenge">
            <h3>Try this today</h3>
            <p id="challenge"></p>
          </div>

          <div class="actions">
            <button id="next" class="primary">Next discovery</button>
            <button id="save" class="secondary">Save</button>
            <button id="learn" class="secondary">Mark learned</button>
          </div>
        </div>
      </section>

      <section class="stats-grid" aria-label="Progress">
        <article><span id="viewed">0</span><p>Discovered</p></article>
        <article><span id="saved">0</span><p>Saved</p></article>
        <article><span id="learned">0</span><p>Learned</p></article>
      </section>

      <section class="library">
        <div class="section-heading">
          <div>
            <p class="eyebrow">YOUR LIBRARY</p>
            <h2>Saved discoveries</h2>
          </div>
        </div>
        <div id="savedList" class="saved-list"></div>
      </section>
    </main>

    <footer>
      <p>2,000 Italian food discoveries from your culinary book collection.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
